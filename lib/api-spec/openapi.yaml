    Listing:
      type: object
      required: [id, title, price, category, sellerId, seller, condition, createdAt]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        price:
          type: number
        currency:
          type: string
        category:
          type: string
        condition:
          type: string
          enum: [new, like_new, good, fair, for_parts]
        imageUrls:
          type: array
          items:
            type: string
        location:
          type: ["string", "null"]
        sellerId:
          type: string
        seller:
          $ref: "#/components/schemas/User"
        isAvailable:
          type: boolean
        viewsCount:
          type: integer
        createdAt:
          type: string

    ListingInput:
      type: object
      required: [title, price, category, condition]
      properties:
        title:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        condition:
          type: string
          enum: [new, like_new, good, fair, for_parts]
        imageUrls:
          type: array
          items:
            type: string
        location:
          type: string

    Category:
      type: object
      required: [id, name, icon]
      properties:
        id:
          type: string
        name:
          type: string
        icon:
          type: string
        listingsCount:
          type: integer

    # ─── COMMUNITY SCHEMAS ────────────────────────────────────────────────────
    Community:
      type: object
      required: [id, name, slug, visibility, membersCount, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        coverUrl:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        visibility:
          type: string
          enum: [public, private, premium]
        membersCount:
          type: integer
        postsCount:
          type: integer
        isJoined:
          type: boolean
        isModerator:
          type: boolean
        createdAt:
          type: string

    CommunityInput:
      type: object
      required: [name, visibility]
      properties:
        name:
          type: string
        description:
          type: string
        visibility:
          type: string
          enum: [public, private, premium]
        coverUrl:
          type: string

    # ─── EVENT SCHEMAS ────────────────────────────────────────────────────────
    Event:
      type: object
      required: [id, title, organizerId, organizer, startsAt, eventType, createdAt]
      properties:
        id:
