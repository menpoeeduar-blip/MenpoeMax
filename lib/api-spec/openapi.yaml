          type: ["string", "null"]
        endedAt:
          type: ["string", "null"]
        createdAt:
          type: string

    StreamInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string
        thumbnailUrl:
          type: string
        category:
          type: string

