          type: boolean
        groupName:
          type: string

    Message:
      type: object
      required: [id, conversationId, senderId, sender, content, createdAt]
      properties:
        id:
          type: string
        conversationId:
          type: string
        senderId:
          type: string
        sender:
          $ref: "#/components/schemas/User"
        content:
          type: string
        mediaUrl:
          type: ["string", "null"]
        mediaType:
          type: ["string", "null"]
        isRead:
          type: boolean
        isEdited:
          type: boolean
        createdAt:
          type: string

    MessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
        mediaUrl:
          type: string
        mediaType:
          type: string

    # ─── NOTIFICATION SCHEMAS ─────────────────────────────────────────────────
    Notification:
      type: object
      required: [id, userId, type, title, isRead, createdAt]
      properties:
        id:
          type: string
        userId:
          type: string
        type:
