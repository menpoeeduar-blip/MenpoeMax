    DashboardSummary:
      type: object
      required: [totalUsers, activePosts, onlineNow, newNotifications]
      properties:
        totalUsers:
          type: integer
        activePosts:
          type: integer
        onlineNow:
          type: integer
        newNotifications:
          type: integer
        trendingHashtags:
          type: array
          items:
            type: string
        suggestedUsers:
          type: array
          items:
            $ref: "#/components/schemas/User"
        upcomingEvents:
          type: array
          items:
            $ref: "#/components/schemas/Event"

    # ─── PROFILE DETAIL SCHEMAS ───────────────────────────────────────────
    Skill:
      type: object
      required: [id, skill, level]
      properties:
        id:
          type: string
        skill:
          type: string
        level:
          type: string
          enum: [beginner, intermediate, advanced, expert]
    SkillInput:
      type: object
      required: [skill]
      properties:
        skill:
          type: string
        level:
          type: string
          enum: [beginner, intermediate, advanced, expert]

    Experience:
      type: object
      required: [id, company, title]
      properties:
        id:
          type: string
        company:
          type: string
        title:
          type: string
        description:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        current:
          type: boolean
    ExperienceInput:
      type: object
      required: [company, title]
      properties:
        company:
          type: string
        title:
          type: string
        description:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        current:
          type: boolean

    Education:
      type: object
      required: [id, institution, degree]
      properties:
        id:
          type: string
        institution:
          type: string
        degree:
          type: string
        field:
          type: string
        startYear:
          type: string
        endYear:
          type: string
        current:
          type: boolean
    EducationInput:
      type: object
      required: [institution, degree]
      properties:
        institution:
          type: string
        degree:
          type: string
        field:
          type: string
        startYear:
          type: string
        endYear:
          type: string
        current:
          type: boolean

    Language:
      type: object
      required: [id, language, proficiency]
      properties:
        id:
          type: string
        language:
          type: string
        proficiency:
          type: string
          enum: [basic, conversational, fluent, native]
    LanguageInput:
      type: object
      required: [language]
      properties:
        language:
          type: string
        proficiency:
          type: string
          enum: [basic, conversational, fluent, native]

    SocialLink:
      type: object
      required: [id, platform, url]
      properties:
        id:
          type: string
        platform:
          type: string
        url:
          type: string
    SocialLinkInput:
      type: object
      required: [platform, url]
      properties:
        platform:
          type: string
        url:
          type: string

    # ─── STORAGE SCHEMAS ───────────────────────────────────────────────────
    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    # ─── FRIEND REQUEST ───────────────────────────────────────────────────
    FriendRequest:
      type: object
      required: [id, requesterId, addresseeId, status, createdAt]
      properties:
        id:
          type: string
        requesterId:
          type: string
        addresseeId:
          type: string
        status:
          type: string
          enum: [pending, accepted, rejected]
        createdAt:
          type: string
