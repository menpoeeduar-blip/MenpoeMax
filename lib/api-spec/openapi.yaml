    GeneratePostInput:
      type: object
      required: [topic]
      properties:
        topic:
          type: string
        tone:
          type: string
          enum: [professional, casual, funny, inspirational]
        includeHashtags:
          type: boolean

    GeneratedContent:
      type: object
      required: [content]
      properties:
        content:
          type: string
        suggestedHashtags:
          type: array
          items:
            type: string

