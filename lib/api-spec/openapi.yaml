          type: string
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        coverUrl:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        role:
          type: string
          enum: [user, creator, company, recruiter, influencer, moderator, admin]
        isVerified:
          type: boolean
        isPremium:
          type: boolean
        followersCount:
          type: integer
        followingCount:
          type: integer
        postsCount:
          type: integer
        isFollowing:
          type: boolean
        birthDate:
          type: ["string", "null"]
        gender:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        skills:
          type: array
          items:
            $ref: '#/components/schemas/Skill'
        experience:
          type: array
          items:
            $ref: '#/components/schemas/Experience'
        education:
          type: array
          items:
            $ref: '#/components/schemas/Education'
        languages:
          type: array
          items:
            $ref: '#/components/schemas/Language'
        socialLinks:
          type: array
          items:
            $ref: '#/components/schemas/SocialLink'
        createdAt:
          type: string

    UserUpdate:
      type: object
      properties:
        displayName:
          type: string
        bio:
          type: string
        location:
          type: string
        website:
          type: string
        avatarUrl:
          type: string
        coverUrl:
          type: string
        birthDate:
          type: string
        gender:
          type: string
          enum: [male, female, non_binary, other, prefer_not_to_say]
        phone:
          type: string
        role:
          type: string
          enum: [user, creator, company, recruiter, influencer, moderator, admin]
        skills:
          type: array
          items:
            $ref: '#/components/schemas/SkillInput'
        experience:
          type: array
          items:
            $ref: '#/components/schemas/ExperienceInput'
        education:
          type: array
          items:
            $ref: '#/components/schemas/EducationInput'
        languages:
          type: array
          items:
            $ref: '#/components/schemas/LanguageInput'
        socialLinks:
          type: array
          items:
            $ref: '#/components/schemas/SocialLinkInput'

    UserStats:
      type: object
      required: [followersCount, followingCount, postsCount, likesReceived, viewsReceived]
      properties:
        followersCount:
          type: integer
        followingCount:
          type: integer
        postsCount:
          type: integer
        likesReceived:
          type: integer
        viewsReceived:
          type: integer

    FollowResult:
      type: object
      required: [following, followersCount]
      properties:
        following:
          type: boolean
        followersCount:
          type: integer

    FriendRequestResult:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ─── POST SCHEMAS ─────────────────────────────────────────────────────────
    Post:
      type: object
      required: [id, authorId, author, content, postType, createdAt]
      properties:
        id:
          type: string
        authorId:
          type: string
        author:
          $ref: "#/components/schemas/User"
        content:
          type: string
        postType:
          type: string
          enum: [text, image, video, audio, reel, poll, gif]
        mediaUrls:
          type: array
          items:
            type: string
        thumbnailUrl:
          type: ["string", "null"]
        hashtags:
          type: array
          items:
            type: string
        likesCount:
          type: integer
        commentsCount:
          type: integer
        sharesCount:
          type: integer
        userReaction:
          type: ["string", "null"]
        isSaved:
          type: boolean
        isShared:
          type: boolean
        viewsCount:
          type: integer
        createdAt:
          type: string

    PostInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
        postType:
          type: string
          enum: [text, image, video, audio, reel, poll, gif]
        mediaUrls:
          type: array
          items:
            type: string
        hashtags:
          type: array
          items:
            type: string

    PostPage:
      type: object
      required: [posts]
      properties:
