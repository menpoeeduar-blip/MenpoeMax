openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: SocialHub API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User operations
  - name: posts
    description: Post operations
  - name: stories
    description: Story operations
  - name: messages
    description: Chat and messaging
  - name: notifications
    description: Notifications
  - name: jobs
    description: Jobs and employment
  - name: marketplace
    description: Marketplace listings
  - name: communities
    description: Groups and communities
  - name: events
    description: Events
  - name: streams
    description: Live streaming
  - name: ai
    description: AI features
  - name: Storage
    description: File upload and serving

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── USERS ───────────────────────────────────────────────────────────────────
  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}/follow:
    post:
      operationId: followUser
      tags: [users]
      summary: Follow a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowResult"
    delete:
      operationId: unfollowUser
      tags: [users]
      summary: Unfollow a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowResult"

  /users/{userId}/friends:
    post:
      operationId: sendFriendRequest
      tags: [users]
      summary: Send a friend request
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequestResult"

  /users/me/friends:
    get:
      operationId: getMyFriends
      tags: [users]
      summary: Get my friend requests and friends
      responses:
        "200":
          description: Friends list
          content:
            application/json:
              schema:
                type: object
                properties:
                  incoming:
                    type: array
                    items:
                      $ref: "#/components/schemas/FriendRequest"
                  outgoing:
                    type: array
                    items:
                      $ref: "#/components/schemas/FriendRequest"
                  friends:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"

  /users/suggestions:
    get:
      operationId: getSuggestedUsers
      tags: [users]
      summary: Get suggested users to follow
      responses:
        "200":
          description: Suggested users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/search:
    get:
      operationId: searchUsers
      tags: [users]
      summary: Search users
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an uploaded object
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /users/me/stats:
    get:
      operationId: getMyStats
      tags: [users]
      summary: Get current user stats (followers, following, posts, etc.)
      responses:
        "200":
          description: User stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStats"

  # ─── POSTS ───────────────────────────────────────────────────────────────────
  /posts:
    get:
      operationId: getFeed
      tags: [posts]
      summary: Get personalized feed
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Feed posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostPage"
    post:
      operationId: createPost
      tags: [posts]
      summary: Create a post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/trending:
    get:
      operationId: getTrendingPosts
      tags: [posts]
      summary: Get trending posts
      responses:
        "200":
          description: Trending posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"

  /posts/reels:
    get:
      operationId: getReels
      tags: [posts]
      summary: Get reels/short videos feed
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Reels
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostPage"

  /posts/{postId}:
    get:
      operationId: getPost
      tags: [posts]
      summary: Get a single post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
    delete:
      operationId: deletePost
      tags: [posts]
      summary: Delete a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /posts/{postId}/like:
    post:
      operationId: likePost
      tags: [posts]
      summary: Like or react to a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReactionInput"
      responses:
        "200":
          description: Reaction result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReactionResult"

  /posts/{postId}/save:
    post:
      operationId: savePost
      tags: [posts]
      summary: Save or unsave a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Save result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveResult"

  /posts/{postId}/share:
    post:
      operationId: sharePost
      tags: [posts]
      summary: Share a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Share result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareResult"

  /posts/{postId}/comments:
    get:
      operationId: getComments
      tags: [posts]
      summary: Get comments for a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
    post:
      operationId: createComment
      tags: [posts]
      summary: Create a comment on a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /posts/saved:
    get:
      operationId: getSavedPosts
      tags: [posts]
      summary: Get saved posts
      responses:
        "200":
          description: Saved posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"

  /posts/hashtag/{tag}:
    get:
      operationId: getPostsByHashtag
      tags: [posts]
      summary: Get posts by hashtag
      parameters:
        - name: tag
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Posts for hashtag
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"

  # ─── STORIES ─────────────────────────────────────────────────────────────────
  /stories:
    get:
      operationId: getStories
      tags: [stories]
      summary: Get stories from people you follow
      responses:
        "200":
          description: Stories grouped by user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoryGroup"
    post:
      operationId: createStory
      tags: [stories]
      summary: Create a new story
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoryInput"
      responses:
        "201":
          description: Created story
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Story"

  /stories/{storyId}/view:
    post:
      operationId: viewStory
      tags: [stories]
      summary: Mark a story as viewed
      parameters:
        - name: storyId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ViewResult"

  # ─── MESSAGES ────────────────────────────────────────────────────────────────
  /conversations:
    get:
      operationId: getConversations
      tags: [messages]
      summary: Get all conversations
      responses:
        "200":
          description: Conversations list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createConversation
      tags: [messages]
      summary: Create or get a conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationInput"
      responses:
        "200":
          description: Conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{conversationId}/messages:
    get:
      operationId: listConversationMessages
      tags: [messages]
      summary: Get messages in a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Sent message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  # ─── NOTIFICATIONS ────────────────────────────────────────────────────────────
  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      summary: Get notifications
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/unread-count:
    get:
      operationId: getUnreadNotificationCount
      tags: [notifications]
      summary: Get unread notification count
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnreadCount"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  # ─── JOBS ─────────────────────────────────────────────────────────────────────
  /jobs:
    get:
      operationId: getJobs
      tags: [jobs]
      summary: Get job listings
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: location
          in: query
          schema:
            type: string
        - name: remote
          in: query
          schema:
            type: boolean
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Job listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Post a job listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobInput"
      responses:
        "201":
          description: Created job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{jobId}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get a job listing
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{jobId}/apply:
    post:
      operationId: applyToJob
      tags: [jobs]
      summary: Apply to a job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobApplicationInput"
      responses:
        "201":
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobApplication"

  /jobs/{jobId}/save:
    post:
      operationId: saveJob
      tags: [jobs]
      summary: Save a job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveResult"

  /jobs/saved:
    get:
      operationId: getSavedJobs
      tags: [jobs]
      summary: Get saved jobs
      responses:
        "200":
          description: Saved jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"

  /jobs/recommended:
    get:
      operationId: getRecommendedJobs
      tags: [jobs]
      summary: Get AI-recommended jobs
      responses:
        "200":
          description: Recommended jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"

  # ─── MARKETPLACE ──────────────────────────────────────────────────────────────
  /marketplace/listings:
    get:
      operationId: getListings
      tags: [marketplace]
      summary: Get marketplace listings
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
      responses:
        "200":
          description: Listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"
    post:
      operationId: createListing
      tags: [marketplace]
      summary: Create a marketplace listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListingInput"
      responses:
        "201":
          description: Created listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"

  /marketplace/listings/{listingId}:
    get:
      operationId: getListing
      tags: [marketplace]
      summary: Get a listing
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"

  /marketplace/categories:
    get:
      operationId: getMarketplaceCategories
      tags: [marketplace]
      summary: Get marketplace categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  # ─── COMMUNITIES ──────────────────────────────────────────────────────────────
  /communities:
    get:
      operationId: getCommunities
      tags: [communities]
      summary: Get communities
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: joined
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Communities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Community"
    post:
      operationId: createCommunity
      tags: [communities]
      summary: Create a community
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommunityInput"
      responses:
        "201":
          description: Created community
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Community"

  /communities/{communityId}:
    get:
      operationId: getCommunity
      tags: [communities]
      summary: Get a community
      parameters:
        - name: communityId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Community
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Community"

  /communities/{communityId}/join:
    post:
      operationId: joinCommunity
      tags: [communities]
      summary: Join a community
      parameters:
        - name: communityId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  /communities/suggested:
    get:
      operationId: getSuggestedCommunities
      tags: [communities]
      summary: Get suggested communities
      responses:
        "200":
          description: Suggested communities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Community"

  # ─── EVENTS ──────────────────────────────────────────────────────────────────
  /events:
    get:
      operationId: getEvents
      tags: [events]
      summary: Get events
      parameters:
        - name: upcoming
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create an event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{eventId}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{eventId}/attend:
    post:
      operationId: attendEvent
      tags: [events]
      summary: Attend an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  # ─── STREAMS ─────────────────────────────────────────────────────────────────
  /streams:
    get:
      operationId: getLiveStreams
      tags: [streams]
      summary: Get active live streams
      responses:
        "200":
          description: Live streams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Stream"
    post:
      operationId: startStream
      tags: [streams]
      summary: Start a live stream
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamInput"
      responses:
        "201":
          description: Created stream
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stream"

  /streams/{streamId}:
    get:
      operationId: getStream
      tags: [streams]
      summary: Get a stream
      parameters:
        - name: streamId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stream
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stream"

  /streams/{streamId}/end:
    post:
      operationId: endStream
      tags: [streams]
      summary: End a live stream
      parameters:
        - name: streamId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"

  # ─── AI ──────────────────────────────────────────────────────────────────────
  /ai/generate-post:
    post:
      operationId: generatePost
      tags: [ai]
      summary: Generate a post using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeneratePostInput"
      responses:
        "200":
          description: Generated post text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedContent"

  /ai/trending-topics:
    get:
      operationId: getTrendingTopics
      tags: [ai]
      summary: Get trending topics and hashtags
      responses:
        "200":
          description: Trending topics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendingTopic"

  # ─── DASHBOARD (wow endpoints) ─────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [users]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

components:
