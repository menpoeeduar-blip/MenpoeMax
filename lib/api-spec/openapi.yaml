          type: string

    ViewResult:
      type: object
      required: [viewed]
      properties:
        viewed:
          type: boolean

    # ─── MESSAGE SCHEMAS ──────────────────────────────────────────────────────
    Conversation:
      type: object
      required: [id, participants, createdAt]
      properties:
        id:
          type: string
        participants:
          type: array
          items:
            $ref: "#/components/schemas/User"
        lastMessage:
          $ref: "#/components/schemas/Message"
        isGroup:
          type: boolean
        groupName:
          type: ["string", "null"]
        unreadCount:
          type: integer
        createdAt:
          type: string

    ConversationInput:
      type: object
      required: [participantIds]
      properties:
        participantIds:
          type: array
          items:
            type: string
