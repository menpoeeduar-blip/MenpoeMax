          type: string
        author:
          $ref: "#/components/schemas/User"
        content:
          type: string
        likesCount:
          type: integer
        parentId:
          type: ["string", "null"]
        replies:
          type: array
          items:
            $ref: "#/components/schemas/Comment"
        createdAt:
          type: string

    CommentInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
        parentId:
          type: string

    ReactionInput:
      type: object
      required: [reaction]
      properties:
        reaction:
          type: string
          enum: [like, love, haha, wow, sad, angry]

    ReactionResult:
      type: object
      required: [reaction, likesCount]
      properties:
        reaction:
          type: ["string", "null"]
        likesCount:
          type: integer

    SaveResult:
      type: object
      required: [saved]
      properties:
        saved:
          type: boolean

    ShareResult:
      type: object
      required: [shared, sharesCount]
      properties:
        shared:
          type: boolean
        sharesCount:
          type: integer

    # ─── STORY SCHEMAS ────────────────────────────────────────────────────────
    Story:
      type: object
      required: [id, authorId, author, mediaUrl, mediaType, createdAt, expiresAt]
      properties:
